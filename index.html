<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Gamers Tricky Myers — Skins</title>
<style>
  :root{ --bg:#0e0f13; --card:#1a1c22; --txt:#e8e8ea; --muted:#8b8f98; --accent:#9acd32; --line:#23262f; }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--txt);font-family:system-ui,"Segoe UI",Roboto,sans-serif}
  header{padding:22px 16px 16px;text-align:center;position:sticky;top:0;
         background:linear-gradient(180deg,#0e0f13,#0e0f13f2);backdrop-filter:blur(6px);
         border-bottom:1px solid var(--line);z-index:5}
  h1{margin:0;font-size:24px;letter-spacing:.5px}
  h1 span{color:var(--accent)}
  .sub{opacity:.55;font-size:13px;margin-top:4px}
  .search{margin:14px auto 0;display:block;width:min(440px,92%);padding:10px 14px;border-radius:10px;
          border:1px solid #2a2d36;background:#15171d;color:var(--txt);font-size:14px;outline:none}
  .search:focus{border-color:var(--accent)}
  .count{opacity:.5;font-size:12px;margin-top:8px}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:14px;
        padding:18px;max-width:1500px;margin:0 auto}
  .card{background:var(--card);border:1px solid var(--line);border-radius:12px;overflow:hidden;
        transition:transform .12s ease,border-color .12s ease}
  .card:hover{transform:translateY(-3px);border-color:var(--accent)}
  .thumb{position:relative;aspect-ratio:16/10;background:#000;cursor:zoom-in}
  .thumb img{width:100%;height:100%;object-fit:cover;display:block}
  .thumb .ph{position:absolute;inset:0;display:none;align-items:center;justify-content:center;
             background:#15171d;color:#555;font-size:12px;cursor:default}
  .card.missing .thumb{cursor:default}
  .card.missing .thumb img{display:none}
  .card.missing .thumb .ph{display:flex}
  .name{padding:9px 10px;font-size:14px;font-weight:600;text-align:center}
  footer{opacity:.4;font-size:12px;text-align:center;padding:24px}
  .lightbox{position:fixed;inset:0;z-index:50;display:none;align-items:center;justify-content:center;
            flex-direction:column;gap:14px;background:rgba(0,0,0,.9);cursor:zoom-out;padding:24px}
  .lightbox.open{display:flex}
  .lightbox img{max-width:92vw;max-height:82vh;object-fit:contain;border-radius:8px;
                box-shadow:0 10px 40px rgba(0,0,0,.6);cursor:default}
  .lightbox .lb-name{font-size:20px;font-weight:700;letter-spacing:.5px}
  .lightbox .lb-hint{position:absolute;top:18px;right:22px;font-size:13px;opacity:.5}
</style>
</head>
<body>
<header>
  <h1>Gamers Tricky Myers — <span>Skins</span></h1>
  <div class="sub">All skins available on the server</div>
  <input class="search" id="q" placeholder="Search a skin…" autocomplete="off">
  <div class="count" id="count"></div>
</header>

<main class="grid" id="grid"></main>
<footer>Made with luv by ChatGPT.</footer>

<div class="lightbox" id="lb">
  <div class="lb-hint">click anywhere to close</div>
  <img id="lbimg" alt="">
  <div class="lb-name" id="lbname"></div>
</div>

<script>
const SKINS = [
 "Ghost","Soap","JohnSoapMacTavish","CaptainPrice","Shadow","Chucky","RickSanchez","Deadpool","Helldemon","Spiderman",
 "RatchetandClank","Peely","Joker","PurpleHeart","Venom","Yuusha","HarleyQuinn","DefaultSkin","AdolfHitler","Vaas",
 "BigSmoke","CarlJohnson","Kennedy","RobotKyle","Terminator","Naruto","Shrek","ArcticAvenger","Motoko","TankDempsey",
 "Nikolai","Richtofen","Takeo","Kermit","JohnWick","Alucard","Miku","StudentRobot","HitlerWhite","FiftyCent",
 "Grinch","GhoulTrooper","PinkGhoulTrooper","PurpleSkullTrooper","BobaFett","DarthMaul","GhostRider","Goku","Leon","Octane",
 "Pheonix","Redbeard","RenegadeRaider","BlackKnight","BriteGunner","MrBeast","GlennQuagmire","CDC","Engineer","Farmgirl",
 "Oldman","Reporter","Zombie","Frozzone","Deafjam","Dawg","Batgirl","EAZ","Hank","Scorpion",
 "ViolentJ","Cleveland","Aborigine","MasterShake","AssaultTrooper","BigBaby","Bob","C3PO","Carti","DonaldTrump",
 "Dorito","HK","JackSparrow","Kirk","Lukk","Megumi","Ninja","OnyxRen","Pualie","TheFlash",
 "Timmy","Xray","Yuletide"
];

const grid  = document.getElementById('grid');
const q     = document.getElementById('q');
const count = document.getElementById('count');

const lb     = document.getElementById('lb');
const lbimg  = document.getElementById('lbimg');
const lbname = document.getElementById('lbname');

function openLightbox(src, name){
  lbimg.src = src;
  lbname.textContent = name;
  lb.classList.add('open');
}
function closeLightbox(){
  lb.classList.remove('open');
  lbimg.removeAttribute('src');
}
lb.addEventListener('click', closeLightbox);
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeLightbox(); });

function render(filter){
  const f = (filter || '').toLowerCase().trim();
  grid.innerHTML = '';
  let shown = 0;
  for (const name of SKINS){
    if (f && !name.toLowerCase().includes(f)) continue;
    shown++;
    const card = document.createElement('div');
    card.className = 'card';
    card.innerHTML =
      '<div class="thumb">' +
        '<img loading="lazy" alt="' + name + '">' +
        '<div class="ph">(no image)</div>' +
      '</div>' +
      '<div class="name">' + name + '</div>';
    const thumb = card.querySelector('.thumb');
    const img = card.querySelector('img');
    img.dataset.try = 'jpg';
    img.addEventListener('error', () => {
      if (img.dataset.try === 'jpg') { img.dataset.try = 'png'; img.src = 'images/' + name + '.png'; }
      else { card.classList.add('missing'); }
    });
    img.src = 'images/' + name + '.jpg';
    thumb.addEventListener('click', () => {
      if (!card.classList.contains('missing')) openLightbox(img.currentSrc || img.src, name);
    });
    grid.appendChild(card);
  }
  count.textContent = SKINS.length + ' skins';
}

q.addEventListener('input', e => render(e.target.value));
render('');
</script>
</body>
</html>
